<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendaftaran Mandiri & QR Code</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #047857;
            --primary-hover: #065f46;
            --bg-main: #f1f5f9;
            --bg-card: #ffffff;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-dark);
            margin: 0; padding: 16px;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            width: 100%; max-width: 420px;
            background: var(--bg-card);
            padding: 28px 24px; border-radius: 20px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            box-sizing: border-box;
            position: relative;
        }

        .gear-icon {
            position: absolute; top: 20px; right: 20px;
            background: var(--bg-card); border: 1px solid var(--border-color);
            width: 36px; height: 36px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            transition: all 0.2s; z-index: 10;
        }
        .gear-icon:hover { transform: rotate(45deg); background: #f8fafc; }
        .gear-icon svg { width: 18px; height: 18px; fill: var(--text-muted); }

        .mode-badge {
            display: none; background: #ea580c; color: white;
            text-align: center; font-size: 11px; font-weight: 700;
            padding: 6px; border-radius: 8px; margin-bottom: 16px;
            text-transform: uppercase; letter-spacing: 0.5px;
            animation: fadeIn 0.3s ease-out;
        }

        h2 { text-align: center; margin: 0 0 6px 0; color: var(--primary); font-size: 22px; font-weight: 700; }
        p.subtitle { text-align: center; color: var(--text-muted); font-size: 13px; margin: 0 0 24px 0; font-weight: 500; }

        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 11px; font-weight: 700; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-dark); }
        
        input, select {
            width: 100%; padding: 12px 14px;
            border: 1px solid var(--border-color);
            border-radius: 10px; box-sizing: border-box; font-size: 14px;
            outline: none; transition: all 0.2s;
            font-family: inherit; color: var(--text-dark);
        }
        input:focus, select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(4, 120, 87, 0.1); }
        
        input[readonly] { background-color: #f8fafc; color: #475569; font-weight: 700; letter-spacing: 0.5px; border-style: dashed; }
        select:disabled { background-color: #f1f5f9; color: #94a3b8; cursor: not-allowed; }

        select option.opt-non-aktif {
            color: #dc2626 !important;
            font-weight: bold;
        }

        .operator-search-panel {
            display: none; background: #fff7ed; border: 1px solid #ffedd5;
            padding: 14px; border-radius: 12px; margin-bottom: 16px;
            animation: fadeIn 0.3s ease-out;
        }

        .dynamic-field { display: none; animation: fadeIn 0.3s ease-out; }

        .btn {
            width: 100%; padding: 14px; background: var(--primary);
            color: white; border: none; border-radius: 10px;
            font-weight: 600; font-size: 15px; cursor: pointer;
            transition: background 0.2s; margin-top: 8px;
            box-shadow: 0 4px 12px rgba(4, 120, 87, 0.15);
        }
        .btn:hover { background: var(--primary-hover); }
        .btn-orange { background: #ea580c; box-shadow: 0 4px 12px rgba(234, 88, 12, 0.15); }
        .btn-orange:hover { background: #c2410c; }
        
        .btn-danger { background: #dc2626 !important; box-shadow: 0 4px 12px rgba(220, 38, 38, 0.2) !important; }
        .btn-danger:hover { background: #b91c1c !important; }

        .btn-batal { background: #64748b; margin-top: 6px; box-shadow: 0 4px 12px rgba(100, 116, 139, 0.15); }
        .btn-batal:hover { background: #475569; }

        .qr-result-box { margin-top: 24px; padding-top: 20px; border-top: 2px dashed var(--border-color); display: none; text-align: center; animation: slideUp 0.4s ease-out; }

        #qrcode-wrapper { display: inline-block; padding: 12px; background: #ffffff; border: 3px solid var(--primary); border-radius: 14px; margin-bottom: 16px; }
        #qrcode img { display: block; width: 200px; height: 200px; }

        .btn-download { background: #2563eb; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.15); }
        .btn-download:hover { background: #1d4ed8; }

        .preview-holder { margin-top: 16px; display: none; animation: fadeIn 0.3s ease-out; }
        .preview-holder img { width: 100%; max-width: 280px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.15); border: 2px solid var(--border-color); }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px);
            display: flex; justify-content: center; align-items: center;
            z-index: 9999; opacity: 0; visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-box {
            background: #ffffff; width: 90%; max-width: 340px;
            padding: 24px; border-radius: 16px; text-align: center;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            transform: scale(0.9); transition: transform 0.3s ease;
        }
        .modal-overlay.active .modal-box { transform: scale(1); }
        .modal-title { font-size: 18px; font-weight: 700; margin: 0 0 8px 0; color: #1e293b; }
        .modal-message { font-size: 14px; color: #64748b; margin: 0 0 20px 0; line-height: 1.5; }
        .modal-btn {
            width: 100%; padding: 12px; background: var(--primary);
            color: white; border: none; border-radius: 8px;
            font-weight: 600; font-size: 14px; cursor: pointer;
            transition: background 0.2s;
        }
        .modal-btn:hover { background: var(--primary-hover); }
        .modal-input { margin-bottom: 14px; text-align: center; font-size: 16px; letter-spacing: 2px; padding: 10px; border-radius: 8px; border: 1px solid var(--border-color); width: 80%; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <div class="gear-icon" id="gear-btn-main" onclick="bukaAksesOperator()">
        <svg viewBox="0 0 24 24">
            <path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.07,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.43-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/>
        </svg>
    </div>

    <div id="operator-badge" class="mode-badge">Mode Operator: Edit & Update Data</div>

    <h2 id="form-main-title">Pendaftaran Mandiri</h2>
    <p class="subtitle">Muda-mudi Daerah Tawangmangu</p>

    <!-- PANEL CARI OPERATOR: Alur diperbaiki mengikuti form utama -->
    <div id="panel-cari-operator" class="operator-search-panel">
        <h4 style="margin: 0 0 10px 0; color: #c2410c; font-size: 13px; text-transform: uppercase;">Pencarian Data Anggota</h4>
        
        <div class="form-group">
            <label style="color: #c2410c;">1. Pilih Desa</label>
            <select id="cari_desa" onchange="handleCariDesaChange()">
                <option value="">-- Pilih Desa --</option>
                <option value="Bandardawung">Bandardawung</option>
                <option value="Karanglo Selatan">Karanglo Selatan</option>
                <option value="Karanglo Utara">Karanglo Utara</option>
                <option value="Krangean">Krangean</option>
            </select>
        </div>

        <div class="form-group">
            <label style="color: #c2410c;">2. Pilih Kelompok</label>
            <select id="cari_kelompok" onchange="loadDaftarNamaDariSupabase()" disabled>
                <option value="">-- Pilih Kelompok --</option>
            </select>
        </div>

        <div class="form-group">
            <label style="color: #c2410c;">3. Cari / Ketik Nama Lengkap</label>
            <input type="text" id="cari_nama_input" list="daftar_nama_datalist" placeholder="Pilih Desa & Kelompok dulu..." onchange="handleNamaManualSelect()" disabled>
            <datalist id="daftar_nama_datalist"></datalist>
        </div>
    </div>
    
    <div class="form-group">
        <label for="id_generus">ID Anggota Anda (Otomatis)</label>
        <input type="text" id="id_generus" readonly>
    </div>
    
    <div class="form-group">
        <label for="nama">Nama Lengkap</label>
        <input type="text" id="nama" placeholder="Ketik nama lengkap..." onblur="formatKapital(this)">
    </div>

    <div class="form-group">
        <label for="jenis_kelamin">Jenis Kelamin</label>
        <select id="jenis_kelamin">
            <option value="Laki-laki">Laki-laki</option>
            <option value="Perempuan">Perempuan</option>
        </select>
    </div>

    <div class="form-group">
        <label for="status">Status</label>
        <select id="status" onchange="handleStatusChange()">
            <option value="Generus">Generus</option>
            <option value="Pengurus">Pengurus</option>
            <option value="MT">MT</option>
        </select>
    </div>

    <div class="form-group dynamic-field" id="field-usia">
        <label for="usia">Usia</label>
        <select id="usia">
            <option value="Pra Remaja">Pra Remaja</option>
            <option value="Remaja">Remaja</option>
            <option value="Usia Mandiri">Usia Mandiri</option>
        </select>
    </div>

    <div class="form-group dynamic-field" id="field-dapukan">
        <label for="input_dapukan">Dapukan</label>
        <input type="text" id="input_dapukan" placeholder="Ketik dapukan..." onblur="formatKapital(this)">
    </div>

    <div class="form-group">
        <label for="desa">Desa</label>
        <select id="desa" onchange="handleDesaChange()">
            <option value="">-- Pilih Desa --</option>
            <option value="Bandardawung">Bandardawung</option>
            <option value="Karanglo Selatan">Karanglo Selatan</option>
            <option value="Karanglo Utara">Karanglo Utara</option>
            <option value="Krangean">Krangean</option>
        </select>
    </div>

    <div class="form-group">
        <label for="kelompok">Kelompok</label>
        <select id="kelompok" disabled>
            <option value="">-- Pilih Kelompok --</option>
        </select>
    </div>

    <button class="btn" id="btn-daftar" onclick="prosesPendaftaranMandiri()">Kirim & Buat QR Code</button>
    
    <button class="btn btn-batal" id="btn-kembali-pendaftaran" onclick="aktifkanModeDaftar()" style="display: none;">Kembali ke Mode Pendaftaran</button>

    <div id="result-section" class="qr-result-box">
        <h3 id="result-title" style="margin: 0 0 4px 0; color: var(--primary); font-size: 16px;">✓ Pendaftaran Berhasil!</h3>
        <p style="font-size: 12px; color: var(--text-muted); margin: 0 0 16px 0;">Silakan simpan ID Card Anda.</p>
        
        <div id="qrcode-wrapper"><div id="qrcode"></div></div>
        <p id="qr-info" style="font-size: 14px; font-weight: 700; margin: 0 0 16px 0; color: var(--text-dark);"></p>
        <button class="btn btn-download" onclick="unduhIDCard()">⬇ Simpan ID Card ke HP</button>

        <div id="preview-container" class="preview-holder">
            <p style="font-size: 12px; color: var(--text-muted); margin: 18px 0 14px 0;">Tekan tepat pada tengah gambar kartu selama 3 detik, pilih "Simpan Gambar":</p>
            <img id="idcard-fallback-img" alt="ID Card Preview">
        </div>
    </div>
</div>

<div id="custom-modal" class="modal-overlay">
    <div class="modal-box">
        <div id="modal-title" class="modal-title">Pemberitahuan</div>
        <div id="modal-message" class="modal-message">Isi pesan di sini.</div>
        <div id="modal-input-container"></div>
        <button id="modal-primary-btn" class="modal-btn" onclick="tutupModal()">OK</button>
    </div>
</div>

<script>
    const PIN_OPERATOR = "354313"; 
    let modeForm = "DAFTAR"; 
    let mapNamaKeId = {}; 
    let statusAsli = ""; 

    // Data Wilayah Desa dan Kelompok (Kapital & Urut Abjad)
    const dataWilayah = {
        "Bandardawung": [
            "Bandardawung Barat", "Bandardawung Timur", "Dawung Atas", "Dawung Bawah", 
            "Dawung Tengah", "Gamping", "Gondang Barat", "Gondang Tengah", 
            "Gondang Timur", "Ngasem", "Pelas Barat", "Pelas Timur"
        ],
        "Karanglo Selatan": [
            "Blimbing 1", "Blimbing 2", "Blimbing 3", "Jabalkanil", 
            "Karanglo", "Pedan Selatan", "Pedan Utara"
        ],
        "Karanglo Utara": [
            "Cepogo", "Dukuh", "Pandeyan", "Plombokan", 
            "Sadakan Kidul 1", "Sadakan Kidul 2", "Sadakan Lor", "Sekuwung"
        ],
        "Krangean": [
            "Gondang Bomo", "Gondosuli", "Krangean Selatan", "Krangean Utara", 
            "Nglegok Atas", "Nglegok Bawah", "Ngreso", "Somokado", 
            "Tawang 1", "Tawang 2", "Watusambang"
        ]
    };

    function formatKapital(el) {
        if (!el.value) return;
        el.value = el.value.split(' ').map(kata => {
            return kata.charAt(0).toUpperCase() + kata.slice(1).toLowerCase();
        }).join(' ');
    }

    const SUPABASE_URL = "https://gttavghryoadthnvwthd.supabase.co"; 
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd0dGF2Z2hyeW9hZHRobnZ3dGhkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5MDI5NDQsImV4cCI6MjA5NjQ3ODk0NH0.0O7I9EqSaiQq8_LKMJS9U-XDuitY6sPfYQVtBsJAeas"; 
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    function tampilkanModal(judul, pesan, callbackAction = null) {
        document.getElementById('modal-title').innerText = judul;
        document.getElementById('modal-message').innerText = pesan;
        document.getElementById('modal-input-container').innerHTML = "";
        const btn = document.getElementById('modal-primary-btn');
        btn.onclick = function() {
            tutupModal();
            if(callbackAction) callbackAction();
        };
        document.getElementById('custom-modal').classList.add('active');
    }

    function tutupModal() {
        document.getElementById('custom-modal').classList.remove('active');
    }

    function bukaAksesOperator() {
        document.getElementById('modal-title').innerText = "Akses Operator";
        document.getElementById('modal-message').innerText = "Masukkan PIN khusus operator kelompok:";
        let htmlInput = `<input type="password" id="pin-input" class="modal-input" placeholder="******" maxlength="10">`;
        document.getElementById('modal-input-container').innerHTML = htmlInput;

        const btn = document.getElementById('modal-primary-btn');
        btn.onclick = function() {
            let pinInput = document.getElementById('pin-input').value;
            if(pinInput === PIN_OPERATOR) {
                tutupModal();
                aktifkanModeUpdate();
            } else {
                tampilkanModal("Akses Ditolak", "PIN yang Anda masukkan salah!");
            }
        };
        document.getElementById('custom-modal').classList.add('active');
        document.getElementById('pin-input').focus();
    }

    function aktifkanModeUpdate() {
        modeForm = "UPDATE";
        statusAsli = ""; 
        
        document.getElementById('gear-btn-main').style.display = "none";
        document.getElementById('operator-badge').style.display = "block";
        document.getElementById('panel-cari-operator').style.display = "block";
        document.getElementById('btn-kembali-pendaftaran').style.display = "block"; 
        document.getElementById('form-main-title').innerText = "Update Data Jama'ah";
        
        document.getElementById('btn-daftar').innerText = "Simpan Perubahan Data";
        document.getElementById('btn-daftar').classList.add('btn-orange');
        document.getElementById('btn-daftar').style.display = "block";
        document.getElementById('result-section').style.display = "none";

        let selectStatus = document.getElementById('status');
        if (!document.getElementById('opt-status-nonaktif')) {
            let optNonAktif = document.createElement('option');
            optNonAktif.value = "Non Aktif";
            optNonAktif.innerText = "Non Aktif (Hapus Data)";
            optNonAktif.id = "opt-status-nonaktif";
            optNonAktif.className = "opt-non-aktif";
            selectStatus.appendChild(optNonAktif);
        }

        kosongkanSemuaKolomForm();
        tampilkanModal("Mode Operator Aktif", "Silakan pilih Desa terlebih dahulu, lalu pilih Kelompok untuk mencari nama jama'ah.");
    }

    function aktifkanModeDaftar() {
        modeForm = "DAFTAR";
        statusAsli = "";
        
        document.getElementById('gear-btn-main').style.display = "flex";
        document.getElementById('operator-badge').style.display = "none";
        document.getElementById('panel-cari-operator').style.display = "none";
        document.getElementById('btn-kembali-pendaftaran').style.display = "none";
        document.getElementById('form-main-title').innerText = "Pendaftaran Mandiri";
        
        document.getElementById('btn-daftar').innerText = "Kirim & Buat QR Code";
        document.getElementById('btn-daftar').classList.remove('btn-orange', 'btn-danger');
        document.getElementById('btn-daftar').style.display = "block";
        document.getElementById('result-section').style.display = "none";

        let optNonAktif = document.getElementById('opt-status-nonaktif');
        if (optNonAktif) { optNonAktif.remove(); }

        kosongkanSemuaKolomForm();
        buatIdOtomatis();
        handleStatusChange();
    }

    // Fungsi Logika Dropdown Pencarian Operator saat Desa Diubah[cite: 1]
    function handleCariDesaChange() {
        const desaSelect = document.getElementById('cari_desa');
        const kelompokSelect = document.getElementById('cari_kelompok');
        const namaInput = document.getElementById('cari_nama_input');
        const desaTerpilih = desaSelect.value;

        kelompokSelect.innerHTML = '<option value="">-- Pilih Kelompok --</option>';
        namaInput.value = "";
        namaInput.disabled = true;
        namaInput.placeholder = "Pilih Kelompok dulu...";

        if (desaTerpilih && dataWilayah[desaTerpilih]) {
            kelompokSelect.disabled = false;
            dataWilayah[desaTerpilih].forEach(kelompok => {
                let opt = document.createElement('option');
                opt.value = kelompok; opt.innerText = kelompok;
                kelompokSelect.appendChild(opt);
            });
        } else {
            kelompokSelect.disabled = true;
        }
    }

    // Memuat nama jama'ah dari Supabase berdasarkan Desa dan Kelompok terpilih[cite: 1]
    async function loadDaftarNamaDariSupabase() {
        let desaTerpilih = document.getElementById('cari_desa').value;
        let kelompokTerpilih = document.getElementById('cari_kelompok').value;
        let inputNama = document.getElementById('cari_nama_input');
        let datalistNama = document.getElementById('daftar_nama_datalist');
        
        inputNama.value = "";
        datalistNama.innerHTML = "";
        mapNamaKeId = {}; 

        if(!kelompokTerpilih) {
            inputNama.disabled = true;
            inputNama.placeholder = "Pilih Kelompok dulu...";
            return;
        }

        inputNama.disabled = false;
        inputNama.placeholder = "Ketik/pilih nama jamaah...";

        let { data, error } = await _supabase
            .from('data_generus')
            .select('id_generus, nama_lengkap')
            .eq('desa', desaTerpilih)
            .eq('kelompok', kelompokTerpilih)
            .order('nama_lengkap', { ascending: true });

        if (error || !data || data.length === 0) {
            inputNama.placeholder = "Tidak ada data di kelompok ini";
            return;
        }

        data.forEach(user => {
            let opt = document.createElement('option');
            opt.value = user.nama_lengkap; 
            datalistNama.appendChild(opt);
            mapNamaKeId[user.nama_lengkap.toLowerCase().trim()] = user.id_generus;
        });
    }

    function handleNamaManualSelect() {
        let namaKetik = document.getElementById('cari_nama_input').value.trim();
        let idTerpilih = mapNamaKeId[namaKetik.toLowerCase()];
        
        if (idTerpilih) {
            tarikDataAnggotaTerpilih(idTerpilih);
        } else if (namaKetik !== "") {
            tampilkanModal("Data Tidak Ditemukan", "Nama tidak terdaftar di kombinasi desa & kelompok ini.");
        }
    }

    // Fungsi Logika Dropdown Form Utama saat Desa Diubah[cite: 1]
    function handleDesaChange() {
        const desaSelect = document.getElementById('desa');
        const kelompokSelect = document.getElementById('kelompok');
        const desaTerpilih = desaSelect.value;

        kelompokSelect.innerHTML = '<option value="">-- Pilih Kelompok --</option>';

        if (desaTerpilih && dataWilayah[desaTerpilih]) {
            kelompokSelect.disabled = false; 
            dataWilayah[desaTerpilih].forEach(kelompok => {
                let opt = document.createElement('option');
                opt.value = kelompok; opt.innerText = kelompok;
                kelompokSelect.appendChild(opt);
            });
        } else {
            kelompokSelect.disabled = true; 
        }
    }

    async function tarikDataAnggotaTerpilih(idTerpilih) {
        let { data, error } = await _supabase
            .from('data_generus')
            .select('*')
            .eq('id_generus', idTerpilih)
            .single();

        if (error || !data) return;

        document.getElementById('id_generus').value = data.id_generus;
        document.getElementById('nama').value = data.nama_lengkap;
        document.getElementById('jenis_kelamin').value = data.jenis_kelamin;
        document.getElementById('status').value = data.status;
        
        statusAsli = data.status;
        document.getElementById('result-section').style.display = "none";

        handleStatusChange();

        if (data.status === "Generus") {
            document.getElementById('usia').value = data.usia_dapukan;
        } else if (data.status === "Pengurus" || data.status === "MT/MS") {
            document.getElementById('input_dapukan').value = data.usia_dapukan;
        }

        document.getElementById('desa').value = data.desa;
        handleDesaChange();
        document.getElementById('kelompok').value = data.kelompok;
    }

    function kosongkanSemuaKolomForm() {
        document.getElementById('id_generus').value = "";
        document.getElementById('nama').value = "";
        document.getElementById('jenis_kelamin').value = "Laki-laki";
        document.getElementById('status').value = "Generus";
        document.getElementById('usia').value = "PAUD";
        document.getElementById('input_dapukan').value = "";
        
        // Reset Dropdown Form Utama
        document.getElementById('desa').value = "";
        handleDesaChange(); 

        // Reset Dropdown Panel Cari Operator
        if(document.getElementById('cari_desa')) {
            document.getElementById('cari_desa').value = "";
            handleCariDesaChange();
        }

        statusAsli = "";
        handleStatusChange();
    }

    function buatIdOtomatis() {
        if(modeForm === "DAFTAR" && !document.getElementById('id_generus').value) {
            const angkaAcak = Math.floor(10000 + Math.random() * 90000); 
            document.getElementById('id_generus').value = "IQ" + angkaAcak;
        }
    }

    function handleStatusChange() {
        const statusValue = document.getElementById('status').value;
        const btnDaftar = document.getElementById('btn-daftar');
        
        document.getElementById('field-usia').style.display = (statusValue === "Generus") ? "block" : "none";
        document.getElementById('field-dapukan').style.display = (statusValue === "Pengurus" || statusValue === "MT/MS") ? "block" : "none";
        
        if (statusValue === "Non Aktif") {
            btnDaftar.innerText = "Hapus Data Secara Permanen";
            btnDaftar.classList.remove('btn-orange');
            btnDaftar.classList.add('btn-danger');
        } else if (modeForm === "UPDATE") {
            btnDaftar.innerText = "Simpan Perubahan Data";
            btnDaftar.classList.remove('btn-danger');
            btnDaftar.classList.add('btn-orange');
        }
    }

    window.onload = function() { buatIdOtomatis(); handleStatusChange(); };

    async function prosesPendaftaranMandiri() {
        let idGenerus = document.getElementById('id_generus').value.trim();
        let nama = document.getElementById('nama').value.trim();
        let status = document.getElementById('status').value;
        let desa = document.getElementById('desa').value;
        let kelompok = document.getElementById('kelompok').value;
        let btn = document.getElementById('btn-daftar');

        if(!idGenerus || !nama) {
            return tampilkanModal("Data Belum Lengkap", "Harap pilih nama jamaah terlebih dahulu sampai ID Anggota terisi!");
        }

        if (modeForm === "UPDATE" && status === "Non Aktif") {
            btn.innerText = "Menghapus..."; btn.disabled = true;
            
            let { data, error } = await _supabase
                .from('data_generus')
                .delete()
                .eq('id_generus', idGenerus)
                .select();

            if (error) {
                tampilkanModal("Gagal Menghapus", "Terjadi kesalahan: " + error.message);
                btn.innerText = "Hapus Data Secara Permanen"; btn.disabled = false;
            } else if (!data || data.length === 0) {
                tampilkanModal("Gagal Menghapus", "Data gagal dihapus. Periksa kembali kebijakan RLS DELETE di Supabase Anda.");
                btn.innerText = "Hapus Data Secara Permanen"; btn.disabled = false;
            } else {
                tampilkanModal("Data Terhapus!", "Data anggota dengan ID " + idGenerus + " telah berhasil dihapus secara otomatis dari Supabase.", function() {
                    kosongkanSemuaKolomForm();
                    btn.disabled = false;
                    loadDaftarNamaDariSupabase();
                });
            }
            return;
        }

        if(!desa || !kelompok) {
            return tampilkanModal("Data Belum Lengkap", "Harap lengkapi Desa dan Kelompok!");
        }

        let nilaiTambahan = "-";
        if (status === "Generus") {
            nilaiTambahan = document.getElementById('usia').value;
        } else if (status === "Pengurus" || status === "MT/MS") {
            nilaiTambahan = document.getElementById('input_dapukan').value.trim();
            if (!nilaiTambahan) {
                return tampilkanModal("Data Belum Lengkap", "Harap masukkan Dapukan!");
            }
        }
        
        btn.innerText = "Memproses..."; btn.disabled = true;

        if (modeForm === "DAFTAR") {
            let { error } = await _supabase.from('data_generus').insert([{
                id_generus: idGenerus, nama_lengkap: nama, jenis_kelamin: document.getElementById('jenis_kelamin').value,
                status: status, usia_dapukan: nilaiTambahan, kelompok: kelompok, desa: desa
            }]);

            if (error) {
                tampilkanModal("Gagal Menyimpan", "Gagal mendaftar: " + error.message);
                btn.innerText = "Kirim & Buat QR Code"; btn.disabled = false;
            } else {
                document.getElementById('result-title').innerText = "✓ Pendaftaran Berhasil!";
                tampilkanQRCode(idGenerus, nama);
            }
        } else if (modeForm === "UPDATE") {
            let { data, error } = await _supabase
                .from('data_generus')
                .update({
                    nama_lengkap: nama, 
                    jenis_kelamin: document.getElementById('jenis_kelamin').value,
                    status: status, 
                    usia_dapukan: nilaiTambahan, 
                    kelompok: kelompok, 
                    desa: desa
                })
                .eq('id_generus', idGenerus)
                .select();

            if (error) {
                tampilkanModal("Gagal Perbarui", "Supabase Error: " + error.message);
                btn.innerText = "Simpan Perubahan Data"; btn.disabled = false;
            } else if (!data || data.length === 0) {
                tampilkanModal("Database Tidak Berubah", "Gagal mengubah data. Pastikan izin UPDATE di RLS Supabase aktif.");
                btn.innerText = "Simpan Perubahan Data"; btn.disabled = false;
            } else {
                if (status !== statusAsli) {
                    document.getElementById('result-title').innerText = "✓ Status Berubah & Berhasil Diperbarui!";
                    tampilkanQRCode(idGenerus, nama);
                    
                    tampilkanModal("Pembaruan Berhasil!", "Data Anggota " + idGenerus + " berhasil diperbarui. Karena STATUS BERUBAH, gambar ID Card baru dengan status '" + status + "' siap disimpan di bawah.", function() {
                        btn.disabled = false;
                        statusAsli = status; 
                        loadDaftarNamaDariSupabase();
                    });
                } else {
                    document.getElementById('result-section').style.display = "none";
                    
                    tampilkanModal("Perubahan Disimpan", "Data Anggota " + idGenerus + " berhasil diperbarui. (QR Code tidak dibuat ulang karena tidak ada perubahan status).", function() {
                        btn.disabled = false;
                        loadDaftarNamaDariSupabase();
                    });
                }
            }
        }
    }

    function tampilkanQRCode(idText, namaOrang) {
        let qrContainer = document.getElementById("qrcode");
        qrContainer.innerHTML = "";
        let canvas = document.createElement("canvas");
        new QRious({element: canvas, value: idText, size: 250, level: 'H'});
        let imgQr = document.createElement("img");
        imgQr.src = canvas.toDataURL("image/png");
        imgQr.id = "qr-image-src";
        qrContainer.appendChild(imgQr);
        document.getElementById('qr-info').innerText = `${namaOrang} [${idText}]`;
        document.getElementById('result-section').style.display = "block";
        
        if (modeForm === "DAFTAR") {
            document.getElementById('btn-daftar').style.display = "none";
        }
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    function unduhIDCard() {
        let idText = document.getElementById('id_generus').value.trim();
        let namaOrang = document.getElementById('nama').value.trim();
        let statusUser = document.getElementById('status').value; 
        let statusTeksFormasi = (statusUser === "Jama'ah Umum") ? "JAMA'AH" : statusUser.toUpperCase();

        let qrImgElement = document.getElementById("qr-image-src");
        let c = document.createElement("canvas");
        let ctx = c.getContext("2d");
        let imgBg = new Image();
        imgBg.crossOrigin = "anonymous"; 
        imgBg.src = "https://gttavghryoadthnvwthd.supabase.co/storage/v1/object/public/id_card_barcode/bg-idcard.jpg"; 

        imgBg.onload = function() {
            c.width = imgBg.width; c.height = imgBg.height;
            ctx.drawImage(imgBg, 0, 0);
            ctx.font = `bold ${Math.round(c.width * 0.070)}px bookman old style`;
            ctx.fillStyle = "#024731"; ctx.textAlign = "center";
            ctx.fillText(`ID ${statusTeksFormasi}`, c.width / 2, c.height * 0.455);
            ctx.drawImage(qrImgElement, (c.width - (c.width * 0.453)) / 2, c.height * 0.52, c.width * 0.447, c.width * 0.415);
            ctx.font = `bold ${Math.round(c.width * 0.035)}px Inter`;
            ctx.fillText(`${namaOrang.toUpperCase()} - ${idText}`, c.width / 2, c.height * 0.87);
            
            let dataUrl = c.toDataURL("image/jpeg", 0.9);
            document.getElementById("idcard-fallback-img").src = dataUrl;
            document.getElementById("preview-container").style.display = "block";
            let link = document.createElement("a");
            link.href = dataUrl; link.download = `ID_CARD_${statusTeksFormasi}_${idText}.jpg`; link.click();
        };
    }
</script>
